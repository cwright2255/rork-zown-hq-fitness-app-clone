name: EAS Update Preview

on:
  push:
    branches:
      - feat/fitleus-light-theme-codemod
  pull_request:
    branches:
      - main

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Publish JS preview to Expo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: expo

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Expo + EAS CLIs
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Resolve EAS branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            REF="${{ github.ref_name }}"
            SAFE="${REF//\//-}"
            echo "name=$SAFE" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve update message
        id: message
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "text=PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          else
            COMMIT_MSG=$(git log -1 --pretty=%s)
            echo "text=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish JS update to EAS
        run: eas update --branch "${{ steps.branch.outputs.name }}" --message "${{ steps.message.outputs.text }}" --non-interactive

      - name: Comment QR + preview link on PR
        if: github.event_name == 'pull_request'
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --branch ${{ steps.branch.outputs.name }} --message "${{ steps.message.outputs.text }}" --non-interactive
          working-directory: expo
          comment: true
          qr-target: 'expo-go'
